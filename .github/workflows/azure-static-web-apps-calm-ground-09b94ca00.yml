name: Static Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v2
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_GROUND_09B94CA00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          action: upload

          app_location: /
          output_location: ""
          skip_app_build: true
